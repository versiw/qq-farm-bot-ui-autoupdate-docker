name: 自动构建镜像 (Auto Build Docker Image)

on:
  schedule:
    - cron: "0 0 * * *" # 每天凌晨 0:00 执行
  workflow_dispatch: # 允许手动点击触发
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - ".github/workflows/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  UPSTREAM_REPO: Penty-d/qq-farm-bot-ui

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # 用于更新 last_version.txt
      packages: write # 用于推送到 GHCR

    steps:
      - name: 检出本仓库 (Checkout this repo)
        uses: actions/checkout@v4

      - name: 检出上游仓库 (Checkout upstream repo)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: main
          path: upstream_code # 将上游代码放在独立目录，不污染根目录

      - name: 解析 Update.log 指纹 (Resolve Update.log fingerprint)
        id: get_update
        run: |
          # 优先使用 Update.log 的最后一次修改提交 SHA；若浅克隆无法拿到，回退为文件内容哈希
          if [ -f upstream_code/Update.log ]; then
            SHA=$(git -C upstream_code log -n 1 --pretty=format:%H -- Update.log || true)
            if [ -z "$SHA" ]; then
              SHA=$(sha256sum upstream_code/Update.log | cut -d' ' -f1 || echo "")
            fi
          else
            SHA=""
          fi
          SHORT=${SHA:0:7}
          echo "sha=$SHA"   >> $GITHUB_OUTPUT
          echo "short=$SHORT" >> $GITHUB_OUTPUT

      - name: 检查是否有更新 (Check Update.log change)
        id: check_change
        run: |
          LAST=$([ -f last_version.txt ] && cat last_version.txt || echo "")
          CUR="${{ steps.get_update.outputs.sha }}"
          if [ -z "$CUR" ]; then
            echo "未能获得 Update.log 指纹，跳过构建"
            echo "changed=false" >> $GITHUB_OUTPUT
          elif [ "$CUR" != "$LAST" ]; then
            echo "检测到 Update.log 变更: $LAST -> $CUR"
            echo "changed=true"  >> $GITHUB_OUTPUT
          else
            echo "Update.log 未变化，跳过构建"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: 准备构建环境 (Prepare Build Context)
        if: steps.check_change.outputs.changed == 'true'
        run: |
          # 创建临时 .dockerignore 优化构建性能
          echo -e "node_modules\n.git" > upstream_code/.dockerignore

      - name: 设置 Docker Buildx (Set up Buildx)
        if: steps.check_change.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR (Log in to GHCR)
        if: steps.check_change.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 读取 core/web 版本号 (Read core/web versions)
        if: steps.check_change.outputs.changed == 'true'
        id: get_versions
        run: |
          CORE=$(jq -r '.version // empty' upstream_code/core/package.json 2>/dev/null || echo "")
          WEB=$(jq -r '.version // empty' upstream_code/web/package.json 2>/dev/null || echo "")
          echo "core=$CORE" >> $GITHUB_OUTPUT
          echo "web=$WEB"   >> $GITHUB_OUTPUT

      - name: 组合构建标签 (Compose tags)
        if: steps.check_change.outputs.changed == 'true'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "BUILD_TAGS<<EOF" >> $GITHUB_ENV
          echo "$IMAGE:latest" >> $GITHUB_ENV
          echo "$IMAGE:sha-${{ steps.get_update.outputs.short }}" >> $GITHUB_ENV
          if [ -n "${{ steps.get_versions.outputs.core }}" ]; then echo "$IMAGE:core-v${{ steps.get_versions.outputs.core }}" >> $GITHUB_ENV; fi
          if [ -n "${{ steps.get_versions.outputs.web }}" ]; then echo "$IMAGE:web-v${{ steps.get_versions.outputs.web }}" >> $GITHUB_ENV; fi
          echo "EOF" >> $GITHUB_ENV

      - name: 提取镜像元数据 (Extract metadata)
        if: steps.check_change.outputs.changed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: 构建并推送镜像 (Build and push Docker image)
        if: steps.check_change.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./upstream_code
          file: ./Dockerfile
          push: true
          tags: ${{ env.BUILD_TAGS }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 仅更新版本记录文件 (Update fingerprint ONLY)
        if: steps.check_change.outputs.changed == 'true'
        run: |
          echo "${{ steps.get_update.outputs.sha }}" > last_version.txt

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add last_version.txt
          # 仅当文件有变动时才提交推送到本仓库
          if git diff --staged --quiet; then
            echo "版本文件未变化"
          else
            git commit -m "chore: 记录 Update.log 指纹 ${{ steps.get_update.outputs.sha }} [skip ci]"
            git push
          fi
