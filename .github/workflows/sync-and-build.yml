name: Sync Upstream and Build

on:
  schedule:
    - cron: '0 0 * * *'  # 每天凌晨 0:00 自动检查并构建
  workflow_dispatch:      # 允许手动点击按钮触发构建
  push:
    branches:
      - main              # 当你修改这个仓库的配置时也触发

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  UPSTREAM_REPO: Penty-d/qq-farm-bot-ui

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 拉取原作者的最新代码
      - name: Checkout upstream repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: main  # 或者使用 pr 分支，取决于你想用哪个版本

      # 2. 将你仓库里的 Dockerfile 复制到原作者的代码目录中
      # 因为上一步把原作者代码下载到了当前目录，我们需要确保 Dockerfile 存在
      - name: Get Dockerfile from this repo
        run: |
          curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录 GHCR
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. 生成镜像标签
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=sha

      # 5. 构建并推送
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max