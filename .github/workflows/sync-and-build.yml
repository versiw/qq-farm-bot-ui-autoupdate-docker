name: 自动构建镜像 (Auto Build Docker Image)

on:
  schedule:
    - cron: "0 0 * * *" # 每天凌晨 0:00 执行
  workflow_dispatch: # 允许手动点击触发
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - ".github/workflows/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  UPSTREAM_REPO: Penty-d/qq-farm-bot-ui

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # 用于更新 last_version.txt
      packages: write # 用于推送到 GHCR

    steps:
      - name: 检出本仓库 (Checkout this repo)
        uses: actions/checkout@v4

      - name: 检出上游仓库 (Checkout upstream repo)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: main
          path: upstream_code # 将上游代码放在独立目录，不污染根目录

      - name: 获取上游版本号 (Get upstream version)
        id: get_version
        run: |
          # 从检出的上游代码目录中读取版本
          VERSION=$(jq -r .version upstream_code/core/package.json 2>/dev/null || echo "unknown")

          if [ "$VERSION" == "null" ] || [ "$VERSION" == "unknown" ]; then
            echo "::warning::无法从 upstream_code/core/package.json 获取有效版本号信号"
            VERSION="unknown"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "检测到上游版本号: $VERSION"

      - name: 检查版本是否变动 (Check version change)
        id: check_change
        run: |
          # 读取本地记录的旧版本号
          LAST_VERSION=$([ -f last_version.txt ] && cat last_version.txt || echo "0.0.0")
          CUR_VERSION="${{ steps.get_version.outputs.version }}"

          if [ "$CUR_VERSION" == "unknown" ]; then
            echo "警告: 当前版本号异常，跳过构建。"
            echo "changed=false" >> $GITHUB_OUTPUT
          elif [ "$CUR_VERSION" != "$LAST_VERSION" ]; then
            echo "检测到版本更新: $LAST_VERSION -> $CUR_VERSION"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "版本未发生变动 ($CUR_VERSION)。跳过构建。"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: 准备构建环境 (Prepare Build Context)
        if: steps.check_change.outputs.changed == 'true'
        run: |
          # 创建临时 .dockerignore 优化构建性能
          echo -e "node_modules\n.git" > upstream_code/.dockerignore

      - name: 设置 Docker Buildx (Set up Buildx)
        if: steps.check_change.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR (Log in to GHCR)
        if: steps.check_change.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取镜像元数据 (Extract metadata)
        if: steps.check_change.outputs.changed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.get_version.outputs.version }}
            type=sha,format=short

      - name: 构建并推送镜像 (Build and push Docker image)
        if: steps.check_change.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./upstream_code
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 仅更新版本记录文件 (Update version record ONLY)
        if: steps.check_change.outputs.changed == 'true'
        run: |
          echo "${{ steps.get_version.outputs.version }}" > last_version.txt

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add last_version.txt
          # 仅当文件有变动时才提交推送到本仓库
          if git diff --staged --quiet; then
            echo "版本文件未变化"
          else
            git commit -m "chore: 记录新版本号 ${{ steps.get_version.outputs.version }} [skip ci]"
            git push
          fi
